name: Deploy Shiny App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('shiny','shinydashboard','DT','readxl','moments','corrplot','RColorBrewer','BSDA','plotrix','ggplot2','car','MASS','lmtest','boot','bslib','shinycssloaders','plotly','rsconnect'))"

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript -e "if (!requireNamespace('rsconnect', quietly = TRUE)) stop('rsconnect is not installed'); rsconnect::setAccountInfo(name=Sys.getenv('SHINYAPPS_ACCOUNT'), token=Sys.getenv('SHINYAPPS_TOKEN'), secret=Sys.getenv('SHINYAPPS_SECRET')); rsconnect::deployApp(appDir='.', appPrimaryDoc='app.R', appName='1hs4-data-science-app', appFiles=c('app.R','data/P2_DeliveryTime.xlsx','data/P3_HaldsCement.xlsx','data/car_prices.xlsx'))"
